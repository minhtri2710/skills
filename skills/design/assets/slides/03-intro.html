<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Self Intro</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #0f172a;
  }
  body {
    display: grid;
    grid-template-columns: 0.95fr 1.05fr;
    gap: 72px;
    padding: 96px;
  }
  .panel {
    border: 1px solid #e2e8f0;
    border-radius: 32px;
    padding: 44px;
  }
  .eyebrow {
    font-size: 22px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #64748b;
  }
  h1 {
    margin: 20px 0 18px;
    font-size: 84px;
    line-height: 0.98;
    letter-spacing: -0.05em;
  }
  p {
    margin: 0;
    font-size: 32px;
    line-height: 1.35;
    color: #334155;
  }
  ol {
    margin: 0;
    padding-left: 36px;
    display: grid;
    gap: 24px;
    font-size: 36px;
    line-height: 1.25;
  }
  li::marker {
    font-weight: 700;
    color: #7c3aed;
  }
</style>
</head>
<body>
  <section class="panel">
    <div class="eyebrow">Self-intro</div>
    <h1>Your name and role</h1>
    <p>Use this slide for a quick intro, meeting goals, or the context your audience needs before the main content starts.</p>
  </section>
  <section class="panel">
    <div class="eyebrow">Starter agenda</div>
    <ol>
      <li>Frame the problem and audience</li>
      <li>Show the proposed direction</li>
      <li>Close with decisions and next steps</li>
    </ol>
  </section>
</body>
</html>
