<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at top right, rgba(79, 70, 229, 0.28), transparent 28%),
      linear-gradient(135deg, #0f172a, #111827 60%, #1e293b);
    color: #f8fafc;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 88px 96px;
  }
  .eyebrow {
    font-size: 28px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(248, 250, 252, 0.72);
  }
  h1 {
    margin: 0;
    max-width: 1080px;
    font-size: 120px;
    line-height: 1;
    letter-spacing: -0.05em;
  }
  p {
    margin: 24px 0 0;
    max-width: 900px;
    font-size: 38px;
    line-height: 1.3;
    color: rgba(248, 250, 252, 0.82);
  }
  .footer {
    display: flex;
    justify-content: space-between;
    font-size: 24px;
    color: rgba(248, 250, 252, 0.68);
  }
</style>
</head>
<body>
  <div class="eyebrow">Starter Deck</div>
  <main>
    <h1>Design review with a bundled multi-file deck shell</h1>
    <p>Use these starter slides as editable placeholders, then replace the copy, colors, and structure with your own content.</p>
  </main>
  <div class="footer">
    <span>Slide 01</span>
    <span>Cover</span>
  </div>
</body>
</html>
